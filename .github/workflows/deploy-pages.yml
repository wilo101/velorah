name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_WEB3FORMS_ACCESS_KEY: ${{ secrets.VITE_WEB3FORMS_ACCESS_KEY }}
          VITE_CONTACT_EMAIL: ${{ secrets.VITE_CONTACT_EMAIL }}
          VITE_HERO_VIDEO_URL: ${{ secrets.VITE_HERO_VIDEO_URL }}
        run: npm run build:pages

      - name: Verify production output (not dev index.html)
        run: |
          test -f dist/index.html
          test -f dist/404.html
          if grep -qE 'src/main\.(jsx|tsx|js|ts)' dist/index.html; then
            echo "::error::dist/index.html still references /src/ — deploy must use Vite build output."
            exit 1
          fi
          if ! grep -qE '\./assets/.+\.(js|css)' dist/index.html; then
            echo "::error::dist/index.html missing hashed ./assets bundle."
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
